name: BikeCom
options:
  bundleIdPrefix: com.jaisungnoh.bikecom
  deploymentTarget:
    iOS: "26.0"
    watchOS: "26.0"
  createIntermediateGroups: true
  # 워치 앱은 iOS 앱 번들의 Watch/ 폴더에 임베드해야 한다("Embed Watch Content",
  # dstSubfolderSpec=16). PlugIns/ 는 앱 익스텐션 전용이라 워치 앱을 거기 넣으면
  # iPhone Watch 앱이 워치 콘텐츠로 인식하지 못해 설치가 안 된다.
  postGenCommand: |
    # Watch 임베드: CodeSignOnCopy 보장 + 표준 Watch/ 경로 검증
    set -e
    sed -i '' \
      -e 's|ATTRIBUTES = (RemoveHeadersOnCopy, );|ATTRIBUTES = (CodeSignOnCopy, RemoveHeadersOnCopy, );|' \
      BikeCom.xcodeproj/project.pbxproj
    if ! grep -qF 'dstPath = "$(CONTENTS_FOLDER_PATH)/Watch";' BikeCom.xcodeproj/project.pbxproj; then
      echo "error: Embed Watch Content(Watch/ 임베드) 단계가 없습니다 — project.yml 의 워치 dependency 확인"
      exit 1
    fi
    if grep -q 'dstSubfolderSpec = 13' BikeCom.xcodeproj/project.pbxproj; then
      echo "error: Watch 앱이 PlugIns 로 임베드됨 — iPhone Watch 앱이 인식하지 못해 설치 불가"
      exit 1
    fi
    if ! grep -q 'CodeSignOnCopy' BikeCom.xcodeproj/project.pbxproj; then
      echo "error: Watch embed must use CodeSignOnCopy"
      exit 1
    fi

schemes:
  BikeCom:
    build:
      targets:
        BikeCom: all
        BikeComWatch: all
    run:
      config: Debug
    archive:
      config: Release
  BikeComWatch:
    build:
      targets:
        BikeComWatch: all
    run:
      config: Debug

settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: 9AWEB9NYHH
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: "5.9"
    GENERATE_INFOPLIST_FILE: NO

# 과거 코스 오버레이용 Google 지도 SDK. 쓰지 않으려면 이 packages 블록과
# 아래 BikeCom 의 GoogleMaps 의존성을 지우면 Apple 지도로 폴백한다.
packages:
  GoogleMaps:
    url: https://github.com/googlemaps/ios-maps-sdk
    from: "9.0.0"

targets:
  # 아이폰 앱
  BikeCom:
    type: application
    platform: iOS
    sources:
      - path: BikeCom
    info:
      path: BikeCom/App/Info.plist
      properties:
        # 없으면 iOS 가 구형 화면 비율로 letterbox → 위아래 검은 여백 발생.
        UILaunchStoryboardName: LaunchScreen
        GMSApiKey: ""
        NSCalendarsFullAccessUsageDescription: "라이딩 종료 시 요약을 캘린더에 기록합니다."
        NSHealthShareUsageDescription: "누적 사이클링 거리와 SpO2를 표시하고, 운동 기록을 가져옵니다."
        NSHealthUpdateUsageDescription: "라이딩을 Apple 건강 앱에 저장합니다."
        NSLocationAlwaysAndWhenInUseUsageDescription: "백그라운드에서도 라이딩 경로를 기록합니다."
        NSLocationWhenInUseUsageDescription: "라이딩 중 GPS 경로·거리·속도를 기록합니다."
        UIBackgroundModes:
          - location
        NSUbiquitousContainers:
          iCloud.com.jaisungnoh.bikecom:
            NSUbiquitousContainerIsDocumentScopePublic: true
            NSUbiquitousContainerName: BikeCom
            NSUbiquitousContainerSupportedFolderLevels: Any
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jaisungnoh.bikecom
        INFOPLIST_FILE: BikeCom/App/Info.plist
        CODE_SIGN_ENTITLEMENTS: BikeCom/App/BikeCom.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS: YES
        INFOPLIST_KEY_UILaunchStoryboardName: LaunchScreen
        TARGETED_DEVICE_FAMILY: "1"
    dependencies:
      # 워치 앱 의존성: copy destination 을 지정하지 않아야 XcodeGen 이 표준
      # "Embed Watch Content"(Watch/) 단계를 만든다 — plugins 로 지정하면 설치 불가.
      - target: BikeComWatch
        embed: true
        codeSign: true
      - package: GoogleMaps
        product: GoogleMaps
    postBuildScripts:
      - name: Verify Watch App Embed
        script: |
          WATCH_APP="${TARGET_BUILD_DIR}/${WRAPPER_NAME}/Watch/BikeComWatch.app"
          if [ ! -d "$WATCH_APP" ]; then
            echo "error: BikeComWatch.app missing from Watch/ — run xcodegen generate"
            exit 1
          fi
          if [ ! -f "$WATCH_APP/Assets.car" ]; then
            echo "error: Watch Assets.car missing — app icon not compiled"
            exit 1
          fi
          if ! /usr/libexec/PlistBuddy -c "Print :CFBundleIcons:CFBundlePrimaryIcon:CFBundleIconName" "$WATCH_APP/Info.plist" >/dev/null 2>&1; then
            echo "error: Watch CFBundleIconName missing — install will fail on device"
            exit 1
          fi
          if [ "$(/usr/libexec/PlistBuddy -c 'Print :WKApplication' "$WATCH_APP/Info.plist" 2>/dev/null)" != "true" ]; then
            echo "error: Watch WKApplication != true — watchOS rejects install (single-target 워치 앱 필수 키)"
            exit 1
          fi

  # 애플워치 컴패니언 앱 (실시간 심박 측정)
  BikeComWatch:
    type: application
    platform: watchOS
    sources:
      - path: BikeComWatch
    info:
      path: BikeComWatch/Info.plist
      properties:
        CFBundleDisplayName: BikeCom
        NSHealthShareUsageDescription: "라이딩 중 심박·속도·케이던스를 측정합니다."
        NSHealthUpdateUsageDescription: "워크아웃 세션을 Apple 건강에 기록합니다."
        # Xcode 26: 단일 타깃 워치 앱은 이 키가 있어야 설치된다. 없으면 watchOS 가
        # 구형 WatchKit Extension 구조로 인식해 설치(또는 워치 동기화)에 실패한다.
        WKApplication: true
        WKCompanionAppBundleIdentifier: com.jaisungnoh.bikecom
        WKRunsIndependentlyOfCompanionApp: false
        WKBackgroundModes:
          - workout-processing
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jaisungnoh.bikecom.watchkitapp
        INFOPLIST_FILE: BikeComWatch/Info.plist
        CODE_SIGN_ENTITLEMENTS: BikeComWatch/BikeComWatch.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS: YES
        TARGETED_DEVICE_FAMILY: "4"
